<div class="bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700">

  <h1 class="text-4xl font-bold text-white text-center mb-6">
    AI Tic Tac Toe
  </h1>

  <p class="text-center text-slate-300 mb-6">
    You are <span class="text-cyan-400 font-bold">X</span> |
    AI is <span class="text-orange-400 font-bold">O</span>
  </p>

  <div class="grid grid-cols-3 gap-3">

    @for (row of board; track $index; let i = $index) {
      @for (cell of row; track $index; let j = $index) {

        <button
          (click)="play(i, j)"
          class="w-28 h-28 rounded-xl bg-slate-700 hover:bg-slate-600 flex items-center justify-center text-5xl font-bold transition-all">

          @if (cell === 'X') {
            <span class="text-cyan-400">X</span>
          }
          @else if (cell === 'O') {
            <span class="text-orange-400">O</span>
          }
          @else {
            <span>&nbsp;</span>
          }

        </button>

      }
    }

  </div>

  <button
    (click)="restart()"
    class="mt-8 w-full rounded-xl bg-blue-600 py-3 text-white font-semibold">
    Restart
  </button>

</div>
