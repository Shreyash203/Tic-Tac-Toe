<div class="bg-slate-800 rounded-2xl p-8 shadow-2xl">

    <h1 class="text-4xl font-bold text-white text-center mb-8">
        AI Tic Tac Toe
    </h1>
    <p class="text-center text-slate-300 text-xl mb-6">
  Current Turn:
  <span class="font-bold text-green-400">
    {{ currentPlayer }}
  </span>
</p>

    <div class="grid grid-cols-3 gap-3">

        @for (row of board; track $index; let i = $index) {

            @for (cell of row; track $index; let j = $index) {

                <button
                    (click)="play(i,j)"
                    class="w-28 h-28
        rounded-xl
       bg-slate-700
       hover:bg-slate-600
       hover:scale-105
       transition-all
       duration-200
       text-5xl
       font-bold
       text-cyan-400
       shadow-lg">

                    {{cell}}

                </button>

            }

        }

    </div>

    <button
        (click)="restart()"
        class="mt-8 w-full py-3 rounded-xl
               bg-blue-600
               hover:bg-blue-700
               text-white
               font-semibold">

        Restart

    </button>

</div>
